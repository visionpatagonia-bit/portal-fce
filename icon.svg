<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Fondo exterior beige/crema -->
    <radialGradient id="bg" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </radialGradient>
    <!-- Gradiente del anillo dorado exterior -->
    <radialGradient id="goldOuter" cx="50%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#e8c97a"/>
      <stop offset="30%"  stop-color="#c9a84c"/>
      <stop offset="60%"  stop-color="#a07828"/>
      <stop offset="80%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#7a5010"/>
    </radialGradient>
    <!-- Gradiente del anillo dorado interior -->
    <radialGradient id="goldInner" cx="50%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#d4b060"/>
      <stop offset="40%"  stop-color="#b08030"/>
      <stop offset="70%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6018"/>
    </radialGradient>
    <!-- Gradiente azul navy del disco central -->
    <radialGradient id="navy" cx="42%" cy="38%" r="65%">
      <stop offset="0%"   stop-color="#2a4a7a"/>
      <stop offset="50%"  stop-color="#1a3060"/>
      <stop offset="100%" stop-color="#0e1e40"/>
    </radialGradient>
    <!-- Brillo sutil en el centro -->
    <radialGradient id="sheen" cx="40%" cy="30%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Sombra drop -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
    <!-- Sombra texto VIP -->
    <filter id="txtShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>

  <!-- Fondo cuadrado crema -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Grupo con sombra -->
  <g filter="url(#shadow)">
    <!-- Anillo dorado exterior -->
    <circle cx="256" cy="256" r="230" fill="url(#goldOuter)"/>
    <!-- Línea oscura separadora exterior -->
    <circle cx="256" cy="256" r="212" fill="#1a1510" opacity="0.6"/>
    <!-- Anillo dorado interior (más delgado) -->
    <circle cx="256" cy="256" r="208" fill="url(#goldInner)"/>
    <!-- Separador interno oscuro -->
    <circle cx="256" cy="256" r="196" fill="#0e1e40"/>
    <!-- Disco navy principal -->
    <circle cx="256" cy="256" r="193" fill="url(#navy)"/>
    <!-- Brillo -->
    <circle cx="256" cy="256" r="193" fill="url(#sheen)"/>
  </g>

  <!-- Texto VIP -->
  <text
    x="256" y="248"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="148"
    letter-spacing="4"
    fill="url(#goldOuter)"
    filter="url(#txtShadow)"
  >VIP</text>

  <!-- Línea decorativa bajo VIP -->
  <line x1="156" y1="282" x2="356" y2="282" stroke="url(#goldInner)" stroke-width="1.5" opacity="0.7"/>

  <!-- Texto PORTAL FCE -->
  <text
    x="256" y="328"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Courier New', Courier, monospace"
    font-weight="400"
    font-size="36"
    letter-spacing="6"
    fill="url(#goldOuter)"
    filter="url(#txtShadow)"
  >PORTAL FCE</text>
</svg>
